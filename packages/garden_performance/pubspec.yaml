name: garden_performance
description: Performance benchmarks for garden.
publish_to: none
repository: https://github.com/misha/dart_garden
resolution: workspace
environment:
  sdk: ^3.10.0
dependencies:
  garden:
    path: ../garden
  args: ^2.7.0
  collection: ^1.19.1
  json_annotation: ^4.9.0
dev_dependencies:
  build_runner: ^2.11.1
  json_serializable: ^6.9.5
  lints: ^6.1.0
scripts:
  analyze: dart analyze
  build: dart run build_runner build --delete-conflicting-outputs
  perftest: dart run bin/perftest.dart
  benchmark: |
    for i in $(seq 1 10); do
      echo "=== Run $i ===";
      dart run bin/perftest.dart --save-if-better; 
    done
