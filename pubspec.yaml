name: garden_repository
publish_to: none
repository: https://github.com/misha/dart_garden
environment:
  sdk: ^3.10.0
workspace:
  - packages/garden
  - packages/garden_dogs
  - packages/example_tictactoe
dev_dependencies:
  melos: ^7.4.0
melos:
  ide:
    intellij:
      enabled: false
  command:
    bootstrap:
      environment:
        sdk: ^3.10.0
      dependencies:
        collection: ^1.19.1
        meta: ^1.16.0
        path: ^1.8.0
      dev_dependencies:
        build_runner: ^2.11.1
        lints: ^6.0.0
        test: ^1.29.0
  scripts:
    test: |
      melos exec --dir-exists=test -- dart test
    build:
      run: |
        melos exec --order-dependents --depends-on=build_runner -- \
          dart run build_runner build --delete-conflicting-outputs
    watch:
      run: |
        melos build
        melos exec --depends-on=build_runner -- \
          dart run build_runner watch --delete-conflicting-outputs
